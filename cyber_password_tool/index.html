<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSec | Password Utility</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <div class="grid-overlay"></div>
    </div>
    
    <div class="loader-wrapper" id="loader">
        <div class="cyber-loader"></div>
    </div>

    <main class="container" id="app" style="display: none;">
        <header>
            <h1 class="glitch-title" data-text="CYBERSEC_SYS">CYBERSEC_SYS</h1>
            <p class="subtitle">Secure Password Generator & Analyzer</p>
        </header>

        <section class="panel top-panel">
            <div class="input-group">
                <input type="password" id="password-input" placeholder="Enter or generate password..." spellcheck="false" autocomplete="off">
                <button type="button" id="toggle-visibility" class="icon-btn" aria-label="Toggle password visibility">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" id="eye-icon">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
                <button type="button" id="copy-btn" class="icon-btn" aria-label="Copy password">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>

            <div class="strength-meter-container">
                <div class="strength-header">
                    <span>Strength</span>
                    <span id="strength-text" class="status-unknown">Awaiting Input</span>
                </div>
                <div class="meter-bg">
                    <div id="meter-fill" class="meter-fill"></div>
                </div>
            </div>

            <div class="suggestions-container" id="suggestions">
                <!-- Suggestions injected here -->
            </div>
        </section>

        <section class="panel bottom-panel">
            <h2>GENERATOR_CONFIG</h2>
            
            <div class="length-slider-group">
                <label for="length-slider">Length: <span id="length-val" class="neon-text">16</span></label>
                <input type="range" id="length-slider" min="8" max="32" value="16" class="cyber-slider">
            </div>

            <div class="checkbox-grid">
                <label class="cyber-checkbox">
                    <input type="checkbox" id="chk-uppercase" checked>
                    <span class="checkmark"></span>
                    Uppercase (A-Z)
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" id="chk-lowercase" checked>
                    <span class="checkmark"></span>
                    Lowercase (a-z)
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" id="chk-numbers" checked>
                    <span class="checkmark"></span>
                    Numbers (0-9)
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" id="chk-symbols" checked>
                    <span class="checkmark"></span>
                    Symbols (!@#$)
                </label>
            </div>

            <button id="generate-btn" class="cyber-button">
                <span>[ EXECUTE: GENERATE ]</span>
            </button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
